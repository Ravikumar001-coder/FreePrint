<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Imposer & Note Optimizer</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.body.innerHTML += '<div style="color: red; padding: 20px; font-family: monospace; z-index: 9999; position: relative; background: white; width: 100vw; border-bottom: 1px solid black;">' + 
          '<h3>Runtime Error!</h3>' + msg + '<br><br>' + (error && error.stack ? error.stack.replace(/\n/g, '<br>') : '') + '</div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color: red; padding: 20px; font-family: monospace; z-index: 9999; position: relative; background: white; width: 100vw; border-bottom: 1px solid black;">' + 
          '<h3>Unhandled Promise Rejection!</h3>' + event.reason + '<br><br>' + (event.reason && event.reason.stack ? event.reason.stack.replace(/\n/g, '<br>') : '') + '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
