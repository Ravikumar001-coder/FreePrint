<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuplexPro | Advanced PDF Imposition & Note Optimizer</title>
    <meta name="description" content="DuplexPro by Indocreonix - The ultimate PDF imposition and note optimization tool. Customize margins, watermarks, duplex prints, and layouts easily." />
    <meta name="keywords" content="DuplexPro, Indocreonix, PDF imposition, note optimizer, PDF printing, booklet maker, print layouts" />
    <meta name="author" content="Indocreonix" />
    <meta property="og:title" content="DuplexPro | PDF Imposition Tool" />
    <meta property="og:description" content="Optimize your PDFs and notes for printing with DuplexPro by Indocreonix." />
    <meta property="og:url" content="https://duplexpro.indocreonix.com" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/watermark.png" />
    <!-- Tell Google bots it's okay to index this site -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.body.innerHTML += '<div style="color: red; padding: 20px; font-family: monospace; z-index: 9999; position: relative; background: white; width: 100vw; border-bottom: 1px solid black;">' + 
          '<h3>Runtime Error!</h3>' + msg + '<br><br>' + (error && error.stack ? error.stack.replace(/\n/g, '<br>') : '') + '</div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color: red; padding: 20px; font-family: monospace; z-index: 9999; position: relative; background: white; width: 100vw; border-bottom: 1px solid black;">' + 
          '<h3>Unhandled Promise Rejection!</h3>' + event.reason + '<br><br>' + (event.reason && event.reason.stack ? event.reason.stack.replace(/\n/g, '<br>') : '') + '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
