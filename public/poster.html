<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuplexPro Poster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        tech: {
                            900: '#060b19',
                            800: '#0b132b',
                            700: '#1c2541',
                            accent: '#00f0ff',
                            glow: '#3b82f6',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #060b19;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.1) 0%, transparent 50%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .poster-container {
            width: 800px;
            height: 1131px; /* A4 Ratio */
            background: rgba(11, 19, 43, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 240, 255, 0.05);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 80px 60px;
            position: relative;
            overflow: hidden;
        }

        /* Abstract tech grid background */
        .poster-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            opacity: 0.5;
        }

        /* Top glowing orb */
        .glow-orb {
            position: absolute;
            top: -150px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(0, 240, 255, 0.2) 0%, transparent 70%);
            z-index: -1;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 60px;
            animation: fadeDown 1s ease-out;
        }

        .logo-img {
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }

        .app-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
            letter-spacing: -2px;
        }

        .app-subtitle {
            font-size: 1.5rem;
            color: #94a3b8;
            font-weight: 300;
            max-width: 600px;
            line-height: 1.4;
        }

        .qr-section {
            margin-top: auto;
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        .qr-frame {
            background: white;
            padding: 24px;
            border-radius: 24px;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.15), 0 0 0 2px rgba(255,255,255,0.1);
            position: relative;
        }

        /* Corner accents for QR */
        .qr-frame::before, .qr-frame::after {
            content: '';
            position: absolute;
            width: 40px; height: 40px;
            border-color: #00f0ff;
            border-style: solid;
        }
        .qr-frame::before {
            top: -10px; left: -10px;
            border-width: 3px 0 0 3px;
            border-top-left-radius: 12px;
        }
        .qr-frame::after {
            bottom: -10px; right: -10px;
            border-width: 0 3px 3px 0;
            border-bottom-right-radius: 12px;
        }

        .qr-image {
            width: 240px;
            height: 240px;
        }

        .scan-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.25rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00f0ff;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 40px;
        }

        .url {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .brand {
            font-size: 1.1rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .highlight {
            color: #3b82f6;
            font-weight: 600;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <div class="glow-orb"></div>
        
        <div class="logo-container">
            <!-- Using the transparent logo we created -->
            <img src="./watermark.png" alt="Indocreonix Logo" class="logo-img" />
        </div>

        <div>
            <h1 class="app-name">DuplexPro</h1>
            <p class="app-subtitle">The ultimate PDF imposition and smart note optimization engine. Turn chaotic documents into perfectly formatted print layouts instantly.</p>
        </div>

        <!-- Abstract Tech Elements -->
        <div class="mt-16 flex gap-6">
            <div class="flex flex-col gap-2">
                <div class="w-12 h-1 bg-tech-accent rounded-full"></div>
                <div class="text-xs text-tech-accent tracking-widest font-mono uppercase">System Active</div>
            </div>
            <div class="flex flex-col gap-2 opacity-40">
                <div class="w-12 h-1 bg-white rounded-full"></div>
                <div class="text-xs text-white tracking-widest font-mono uppercase">Imposition Ready</div>
            </div>
        </div>

        <div class="qr-section">
            <div class="scan-text">Scan to Access</div>
            <div class="qr-frame">
                <!-- Using a high-quality generated QR code pointing to the live URL -->
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://duplexpro.indocreonix.com&margin=0" alt="QR Code" class="qr-image" />
            </div>
        </div>

        <div class="footer">
            <div class="url">duplexpro.indocreonix.com</div>
            <div class="brand">Powered by <span class="highlight">Indocreonix</span></div>
        </div>
    </div>

</body>
</html>
